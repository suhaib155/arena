<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-labelledby="t">
<title id="t">Progressive decentralization from stewardship to community ownership</title>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#A3AAB8"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#246BFE"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#18C987"/></marker>
</defs>
<rect width="760" height="280" rx="18" fill="#F8FAF7"/>
<text x="40" y="46" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="17" font-weight="800" fill="#111827">Progressive decentralization</text><rect x="50" y="108" width="190" height="76" rx="14" fill="#E7F0FF" stroke="#246BFE" stroke-width="1.6"/>
<text x="145" y="140" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Stewardship</text>
<text x="145" y="161" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">fast and safe while young</text><rect x="285" y="108" width="190" height="76" rx="14" fill="#E2F8EF" stroke="#18C987" stroke-width="1.6"/>
<text x="380" y="140" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Shared governance</text>
<text x="380" y="161" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">community + timelock</text><rect x="520" y="108" width="190" height="76" rx="14" fill="#F4F1FF" stroke="#7657FF" stroke-width="1.6"/>
<text x="615" y="140" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Community-owned</text>
<text x="615" y="161" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">params + treasury</text><path d="M 240 146 L 283 146" fill="none" stroke="#18C987" stroke-width="2" marker-end="url(#arrG)"/><path d="M 475 146 L 518 146" fill="none" stroke="#7657FF" stroke-width="2" marker-end="url(#arr)"/><text x="40" y="228" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Control moves to the community as the network proves itself.</text>
</svg>