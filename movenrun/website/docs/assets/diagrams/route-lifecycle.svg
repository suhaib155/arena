<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
<title id="t">Route lifecycle: submitted, processing, checks, then verified or rejected, with a dashed optional future on-chain step</title>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#A3AAB8"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#246BFE"/></marker>
</defs>
<rect width="760" height="300" rx="18" fill="#F8FAF7"/>
<text x="40" y="46" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="17" font-weight="800" fill="#111827">Route verification lifecycle</text><rect x="40" y="92" width="130" height="64" rx="14" fill="#E7F0FF" stroke="#246BFE" stroke-width="1.6"/>
<text x="105" y="118" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Submitted</text>
<text x="105" y="139" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">POST /gps/submit</text><rect x="210" y="92" width="140" height="64" rx="14" fill="#F1F6F3" stroke="#667085" stroke-width="1.6"/>
<text x="280" y="118" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Processing</text>
<text x="280" y="139" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">queued validation</text><rect x="390" y="92" width="150" height="64" rx="14" fill="#FFF9EE" stroke="#F7B955" stroke-width="1.6"/>
<text x="465" y="118" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Checks</text>
<text x="465" y="139" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">speed · accuracy · dedup</text><rect x="580" y="60" width="150" height="56" rx="14" fill="#E2F8EF" stroke="#18C987" stroke-width="1.6"/>
<text x="655" y="82" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Verified</text>
<text x="655" y="103" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">signed proof</text><rect x="580" y="138" width="150" height="56" rx="14" fill="#FDECEC" stroke="#FF6B4A" stroke-width="1.6"/>
<text x="655" y="160" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Rejected</text>
<text x="655" y="181" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">reason recorded</text><path d="M 170 124 L 206 124" fill="none" stroke="#A3AAB8" stroke-width="2" marker-end="url(#arr)"/><path d="M 350 124 L 386 124" fill="none" stroke="#A3AAB8" stroke-width="2" marker-end="url(#arr)"/><path d="M 540 108 L 576 92" fill="none" stroke="#A3AAB8" stroke-width="2" marker-end="url(#arr)"/><path d="M 540 140 L 576 160" fill="none" stroke="#A3AAB8" stroke-width="2" marker-end="url(#arr)"/><rect x="580" y="232" width="150" height="58" rx="14" fill="#F4F1FF" stroke="#7657FF" stroke-width="1.6" stroke-dasharray="6 5"/>
<text x="655" y="255" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#667085">On-chain action</text>
<text x="655" y="276" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">optional · future · gated</text><path d="M 655 116 L 655 228" fill="none" stroke="#7657FF" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arr)"/><text x="40" y="250" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Status, route hash, distance, and result are persisted; duplicates are rejected before signing.</text><text x="40" y="272" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">The dashed step never runs today — proofs exist so a future opt-in layer could use them.</text>
</svg>