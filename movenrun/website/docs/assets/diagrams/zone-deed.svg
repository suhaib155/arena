<text x="40" y="46" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="17" font-weight="800" fill="#111827">A Zone Deed</text><polygon points="202.0,128.0 202.0,188.0 150.0,218.0 98.0,188.0 98.0,128.0 150.0,98.0" fill="#E2F8EF" stroke="#18C987" stroke-width="3"/><text x="150" y="246" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="12.5" font-weight="700" fill="#111827">A place on the map</text><rect x="320" y="92" width="200" height="150" rx="16" fill="#FFFFFF" stroke="#7657FF" stroke-width="2"/><polygon points="440.8,122.0 440.8,146.0 420.0,158.0 399.2,146.0 399.2,122.0 420.0,110.0" fill="#F4F1FF" stroke="#7657FF" stroke-width="2"/><text x="420" y="182" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Zone Deed</text><text x="420" y="202" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">owner · provenance</text><text x="420" y="218" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">defense · yield</text><path d="M 214 158 L 316 158" fill="none" stroke="#7657FF" stroke-width="2" marker-end="url(#arr)"/><rect x="590" y="118" width="140" height="96" rx="14" fill="#F4F1FF" stroke="#7657FF" stroke-width="1.6"/>
