<text x="625" y="280" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">capture · challenge · stake · govern</text><path d="M 625 160 L 625 228" fill="none" stroke="#7657FF" stroke-width="2" marker-end="url(#arr)"/><rect x="300" y="232" width="170" height="66" rx="14" fill="#FDECEC" stroke="#FF6B4A" stroke-width="1.6"/>
