<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
<title id="t">Roadmap from movement beta to a community-owned network</title>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#A3AAB8"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#246BFE"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#18C987"/></marker>
</defs>
<rect width="760" height="300" rx="18" fill="#F8FAF7"/>
<text x="40" y="46" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="17" font-weight="800" fill="#111827">Roadmap</text><rect x="40" y="92" width="158" height="92" rx="14" fill="#E2F8EF" stroke="#18C987" stroke-width="1.6"/>
<text x="119" y="132" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Movement</text>
<text x="119" y="153" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">prove the loop</text><text x="119" y="116" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">Phase 1</text><path d="M 198 138 L 218 138" fill="none" stroke="#246BFE" stroke-width="2" marker-end="url(#arrB)"/><rect x="218" y="92" width="158" height="92" rx="14" fill="#E7F0FF" stroke="#246BFE" stroke-width="1.6"/>
<text x="297" y="132" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">City competition</text>
<text x="297" y="153" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">clubs and seasons</text><text x="297" y="116" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">Phase 2</text><path d="M 376 138 L 396 138" fill="none" stroke="#246BFE" stroke-width="2" marker-end="url(#arrB)"/><rect x="396" y="92" width="158" height="92" rx="14" fill="#F4F1FF" stroke="#7657FF" stroke-width="1.6"/>
<text x="475" y="132" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Onchain economy</text>
<text x="475" y="153" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">deeds and $MOVE</text><text x="475" y="116" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">Phase 3</text><path d="M 554 138 L 574 138" fill="none" stroke="#246BFE" stroke-width="2" marker-end="url(#arrB)"/><rect x="574" y="92" width="158" height="92" rx="14" fill="#FFF9EE" stroke="#F7B955" stroke-width="1.6"/>
<text x="653" y="132" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Community-owned</text>
<text x="653" y="153" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">decentralized DAO</text><text x="653" y="116" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">Phase 4</text><text x="40" y="236" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Each phase builds on a foundation that works. Timing and details evolve as the network grows.</text>
</svg>