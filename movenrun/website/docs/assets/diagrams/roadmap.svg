<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
<title id="t">Roadmap with four phases, exit criteria, and a release-gate barrier before the conditional final phase</title>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#A3AAB8"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#246BFE"/></marker>
</defs>
<rect width="760" height="300" rx="18" fill="#F8FAF7"/>
<text x="40" y="44" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="17" font-weight="800" fill="#111827">Roadmap — phases and gates</text><rect x="40" y="84" width="158" height="96" rx="14" fill="#E2F8EF" stroke="#18C987" stroke-width="1.6"/>
<text x="119" y="137" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Health-first beta</text>
<text x="119" y="108" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">Phase 1</text><text x="119" y="162" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" fill="#667085">exit: loop feels good · retention</text><path d="M 198 132 L 214 132" fill="none" stroke="#246BFE" stroke-width="2" marker-end="url(#arrB)"/><rect x="218" y="84" width="158" height="96" rx="14" fill="#E7F0FF" stroke="#246BFE" stroke-width="1.6"/>
<text x="297" y="137" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Clubs &amp; city systems</text>
<text x="297" y="108" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">Phase 2</text><text x="297" y="162" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" fill="#667085">exit: stable, fair multiplayer</text><path d="M 376 132 L 392 132" fill="none" stroke="#246BFE" stroke-width="2" marker-end="url(#arrB)"/><rect x="396" y="84" width="158" height="96" rx="14" fill="#F4F1FF" stroke="#7657FF" stroke-width="1.6"/>
<text x="475" y="137" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Verification + testnet</text>
<text x="475" y="108" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">Phase 3</text><text x="475" y="162" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" fill="#667085">exit: reliable GPS · audited V2</text><path d="M 554 132 L 594 132" fill="none" stroke="#246BFE" stroke-width="2" marker-end="url(#arrB)"/><rect x="598" y="84" width="158" height="96" rx="14" fill="#FFF9EE" stroke="#F7B955" stroke-width="1.6" stroke-dasharray="7 6"/>
<text x="677" y="137" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Cities &amp; partners</text>
<text x="677" y="108" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">Phase 4</text><text x="677" y="162" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" fill="#667085">exit: legal + ops readiness</text><rect x="568" y="70" width="10" height="124" rx="5" fill="#FF6B4A"/><text x="573" y="216" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#FF6B4A">RELEASE GATES</text><text x="40" y="256" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Exit criteria, not dates. Everything right of the red gate — including any mainnet economy — is conditional.</text><text x="40" y="278" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Gates: verification · abuse resistance · privacy · density · retention · audit · legal · operations.</text>
</svg>