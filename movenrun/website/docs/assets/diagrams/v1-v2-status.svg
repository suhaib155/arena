<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#246BFE"/></marker>
</defs>
<rect width="760" height="280" rx="18" fill="#F8FAF7"/>
<text x="40" y="44" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="17" font-weight="800" fill="#111827">Contract status: V1 · V2 · production</text><rect x="40" y="78" width="210" height="130" rx="14" fill="#FFF9EE" stroke="#F7B955" stroke-width="1.6"/>
<text x="145" y="148" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">V1 suite</text>
<text x="145" y="132" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">deployed on Base Sepolia</text><text x="145" y="150" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">16 documented discrepancies</text><text x="145" y="168" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">not production · not audited</text><rect x="66" y="180" width="148" height="22" rx="11" fill="#FFF3E0"/>
<text x="140" y="195" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#B07908">EXPERIMENTAL TESTNET</text><rect x="276" y="78" width="210" height="130" rx="14" fill="#FFFFFF" stroke="#FF6B4A" stroke-width="1.6" stroke-dasharray="6 5"/>
<text x="381" y="148" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">V2 suite</text>
<text x="381" y="132" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">source + tests only (open PR)</text><text x="381" y="150" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">fixes V1 defects · EIP-712</text><text x="381" y="168" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">not merged · not deployed</text><rect x="322" y="180" width="96.80000000000001" height="22" rx="11" fill="#FDECEC"/>
<text x="370.4" y="195" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#C2410C">UNDER REVIEW</text><rect x="512" y="78" width="210" height="130" rx="14" fill="#F1F6F3" stroke="#A3AAB8" stroke-width="1.6" stroke-dasharray="3 5"/>
<text x="617" y="148" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#667085">Production layer</text>
<text x="617" y="132" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">no mainnet deployment</text><text x="617" y="150" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">requires audit + legal + gates</text><text x="617" y="168" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" fill="#667085">may not ship</text><rect x="566" y="180" width="96.80000000000001" height="22" rx="11" fill="#EAECEF"/>
<text x="614.4" y="195" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#667085">NOT LAUNCHED</text><path d="M 250 143 L 272 143" fill="none" stroke="#A3AAB8" stroke-width="2" marker-end="url(#arr)"/><path d="M 486 143 L 508 143" fill="none" stroke="#A3AAB8" stroke-width="2" marker-end="url(#arr)"/><text x="40" y="252" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Characterize the deployed experiment → redesign in isolation → only then, maybe, production.</text>
