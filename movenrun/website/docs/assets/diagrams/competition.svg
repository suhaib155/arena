<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
<title id="t">Competition from zones to districts to city wars</title>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#A3AAB8"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#246BFE"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#18C987"/></marker>
</defs>
<rect width="760" height="300" rx="18" fill="#F8FAF7"/>
<text x="40" y="46" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="17" font-weight="800" fill="#111827">From zones to cities</text><rect x="50" y="108" width="170" height="76" rx="14" fill="#E2F8EF" stroke="#18C987" stroke-width="1.6"/>
<text x="135" y="140" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Zones</text>
<text x="135" y="161" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">you capture and hold</text><rect x="295" y="108" width="170" height="76" rx="14" fill="#E7F0FF" stroke="#246BFE" stroke-width="1.6"/>
<text x="380" y="140" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Districts</text>
<text x="380" y="161" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">zones combined</text><rect x="540" y="108" width="170" height="76" rx="14" fill="#F4F1FF" stroke="#7657FF" stroke-width="1.6"/>
<text x="625" y="140" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">City wars</text>
<text x="625" y="161" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">clubs contest control</text><path d="M 220 146 L 293 146" fill="none" stroke="#246BFE" stroke-width="2" marker-end="url(#arrB)"/><path d="M 465 146 L 538 146" fill="none" stroke="#7657FF" stroke-width="2" marker-end="url(#arr)"/><text x="40" y="232" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Zones build into districts; clubs contest districts; seasons crown cities — then it begins again.</text>
</svg>