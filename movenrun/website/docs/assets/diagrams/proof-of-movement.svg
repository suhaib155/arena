<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-labelledby="t">
<title id="t">Proof of movement pipeline from route to onchain settlement</title>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#A3AAB8"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#246BFE"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#18C987"/></marker>
</defs>
<rect width="760" height="320" rx="18" fill="#F8FAF7"/>
<text x="40" y="46" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="17" font-weight="800" fill="#111827">Proof of movement</text><rect x="40" y="92" width="120" height="62" rx="14" fill="#E7F0FF" stroke="#246BFE" stroke-width="1.6"/>
<text x="100" y="117" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Route</text>
<text x="100" y="138" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">your session</text><rect x="196" y="92" width="130" height="62" rx="14" fill="#F1F6F3" stroke="#667085" stroke-width="1.6"/>
<text x="261" y="117" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Validate</text>
<text x="261" y="138" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">plausible motion</text><rect x="362" y="92" width="130" height="62" rx="14" fill="#E2F8EF" stroke="#18C987" stroke-width="1.6"/>
<text x="427" y="117" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Map to zones</text>
<text x="427" y="138" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">hex grid</text><rect x="528" y="60" width="190" height="56" rx="14" fill="#F4F1FF" stroke="#7657FF" stroke-width="1.6"/>
<text x="623" y="82" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Proof + oracle</text>
<text x="623" y="103" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">signed attestation</text><rect x="528" y="132" width="190" height="56" rx="14" fill="#FDECEC" stroke="#FF6B4A" stroke-width="1.6"/>
<text x="623" y="154" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Rejected</text>
<text x="623" y="175" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">spoofed or duplicate</text><path d="M 160 123 L 192 123" fill="none" stroke="#A3AAB8" stroke-width="2" marker-end="url(#arr)"/><path d="M 326 123 L 358 123" fill="none" stroke="#A3AAB8" stroke-width="2" marker-end="url(#arr)"/><path d="M 492 116 L 524 96" fill="none" stroke="#18C987" stroke-width="2" marker-end="url(#arrG)"/><path d="M 492 140 L 524 160" fill="none" stroke="#FF6B4A" stroke-width="2" marker-end="url(#arr)"/><rect x="528" y="224" width="190" height="54" rx="14" fill="#E2F8EF" stroke="#18C987" stroke-width="1.6"/>
<text x="623" y="245" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827">Settled onchain</text>
<text x="623" y="266" text-anchor="middle" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11" fill="#667085">capture · rewards</text><path d="M 623 116 L 623 220" fill="none" stroke="#7657FF" stroke-width="2" marker-end="url(#arr)"/><text x="40" y="250" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Real movement becomes a signed proof that onchain contracts can trust.</text><text x="40" y="272" font-family="Sora, 'Plus Jakarta Sans', system-ui, sans-serif" font-size="11.5" fill="#667085">Effort is rewarded; fabrication is rejected.</text>
</svg>