name: mobile-checks

# Runs the mobile app's type-check on every PR and on pushes to main, so
# regressions in movenrun/mobile are caught automatically. No secrets required.
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: this workflow only checks out, installs, and type-checks —
# it never pushes, comments, or publishes anything.
permissions:
  contents: read

jobs:
  lint:
    name: Mobile type-check
    runs-on: ubuntu-latest
    # The Yarn 4 workspaces project lives in the movenrun/ subdirectory.
    defaults:
      run:
        working-directory: movenrun
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The repo pins Yarn 4 via package.json "packageManager" (the single
      # source of truth); Corepack provisions the right Yarn version.
      - name: Enable Corepack
        run: corepack enable

      - name: Verify package manager version
        run: node scripts/verify-package-manager.mjs

      # movenrun/yarn.lock is committed and deterministic.
      - name: Install dependencies (immutable)
        run: yarn install --immutable

      - name: Type-check @movenrun/mobile
        run: yarn workspace @movenrun/mobile lint

      # Offline node tests for the secure session storage core (no device, no
      # network, no native module — see mobile/src/lib/secureSession.ts).
      - name: Test @movenrun/mobile
        run: yarn workspace @movenrun/mobile test
