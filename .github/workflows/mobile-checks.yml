name: mobile-checks

# Runs the mobile app's type-check on every PR and on pushes to main, so
# regressions in movenrun/mobile are caught automatically. No secrets required.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Mobile type-check
    runs-on: ubuntu-latest
    # The Yarn 4 workspaces project lives in the movenrun/ subdirectory.
    defaults:
      run:
        working-directory: movenrun
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The repo pins Yarn 4 via package.json "packageManager"; Corepack
      # provisions the right Yarn version.
      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Type-check @movenrun/mobile
        run: yarn workspace @movenrun/mobile lint
