name: backend-checks

# Type-checks and tests the backend's read-only blockchain module on PRs that
# touch backend / shared / the contracts deployment record, and on pushes to
# main. No secrets required. Does not touch the EAS APK workflow or mobile.
on:
  pull_request:
    paths:
      - "movenrun/backend/**"
      - "movenrun/shared/**"
      - "movenrun/contracts/deployments/**"
      - ".github/workflows/backend-checks.yml"
  push:
    branches: [main]
    paths:
      - "movenrun/backend/**"
      - "movenrun/shared/**"
      - "movenrun/contracts/deployments/**"

jobs:
  backend:
    name: Backend typecheck & test
    runs-on: ubuntu-latest
    # The Yarn 4 workspaces project lives in the movenrun/ subdirectory.
    defaults:
      run:
        working-directory: movenrun
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The repo pins Yarn 4 via package.json "packageManager"; Corepack
      # provisions the right Yarn version.
      - name: Enable Corepack
        run: corepack enable

      # movenrun/yarn.lock is committed and deterministic.
      - name: Install dependencies (immutable)
        run: yarn install --immutable

      - name: Type-check @movenrun/backend
        run: yarn workspace @movenrun/backend typecheck

      - name: Test @movenrun/backend
        run: yarn workspace @movenrun/backend test
